<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | EduHub</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- We don't need auth.css anymore as it's built into style.css Phase 0 -->
</head>
<body>
  <header class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-badge">E</span>
        EduHub
      </a>

      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="register.html" class="btn btn-primary">Register</a>
        
        <!-- Theme Toggle Button -->
        <button id="themeToggleBtn" class="theme-toggle" aria-label="Toggle Dark Mode">
          <svg class="moon-icon" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <svg class="sun-icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-card reveal-item reveal-visible" style="opacity: 1; transform: none;">
      <h1>Welcome Back 👋</h1>
      <p style="color: var(--muted); margin-bottom: var(--space-6);">Login to continue using EduHub.</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="student@eduhub.edu" />
        </div>

        <div class="form-group" style="position: relative;">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Enter your password" />
          <button type="button" id="togglePassword" style="position: absolute; right: 14px; top: 46px; background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px;">
            👁️
          </button>
        </div>

        <button type="submit" class="btn btn-primary btn-full" style="margin-top: var(--space-2);">Login</button>

        <div id="message" class="message-box" style="display: none;"></div>
      </form>

      <p class="auth-switch" style="text-align: center; margin-top: var(--space-6); color: var(--muted);">
        Don't have an account?
        <a href="register.html" style="font-weight: 800;">Register here</a>
      </p>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>

  <script>
    const loginForm = document.getElementById('loginForm');
    const message = document.getElementById('message');
    const togglePasswordBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const submitBtn = loginForm.querySelector('button[type="submit"]');

    togglePasswordBtn.addEventListener('click', () => {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        togglePasswordBtn.textContent = '🔒';
      } else {
        passwordInput.type = 'password';
        togglePasswordBtn.textContent = '👁️';
      }
    });

    loginForm.addEventListener('submit', async function (event) {
      event.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';
      message.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = passwordInput.value;

      try {
        const data = await apiRequest('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });

        saveAuthData(data.token, data.user);

        message.textContent = 'Login successful! Redirecting...';
        message.className = 'message-box success';
        message.style.display = 'block';

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 800);
      } catch (error) {
        message.textContent = error.message;
        message.className = 'message-box error';
        message.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
