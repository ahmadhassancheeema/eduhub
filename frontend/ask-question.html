<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ask Question | EduHub</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/learning.css" />
  <link rel="stylesheet" href="css/forum.css" />
</head>
<body>
  <header class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-badge">E</span>
        EduHub
      </a>

      <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="learning.html">Learning</a>
        <a href="favorites.html">Favorites</a>
        <a href="forum.html">Forum</a>
        <a href="bookstore.html">Bookstore</a>
        <a href="cart.html">Cart</a>
        <a href="orders.html">Orders</a>
        <button id="logoutButton" class="btn btn-secondary">Logout</button>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-header">
      <div class="container">
        <a href="forum.html" class="back-link">← Back to Forum</a>

        <div class="page-header-card">
          <p class="eyebrow">Ask Question</p>
          <h1>Post a clear academic question</h1>
          <p>
            Include enough detail so other students can understand and answer your question.
          </p>
        </div>
      </div>
    </section>

    <section class="container">
      <div id="askQuestionMessage" class="message-box"></div>

      <form id="askQuestionForm" class="forum-form">
        <div class="form-group">
          <label for="questionTitle">Question Title</label>
          <input
            type="text"
            id="questionTitle"
            placeholder="Example: How do I use fetch() with Express?"
            required
          />
        </div>

        <div class="form-group">
          <label for="questionCategory">Category</label>
          <select id="questionCategory" required>
            <option value="">Select category</option>
          </select>
        </div>

        <div class="form-group">
          <label for="questionTags">Tags</label>
          <input
            type="text"
            id="questionTags"
            placeholder="Example: javascript, express, api"
          />
          <small style="color: var(--muted);">
            Separate tags using commas.
          </small>
        </div>

        <div class="form-group">
          <label for="questionBody">Question Details</label>
          <textarea
            id="questionBody"
            placeholder="Explain what you are trying to do, what error you are getting, and what you have tried."
            required
          ></textarea>
        </div>

        <button id="postQuestionButton" type="submit" class="btn btn-primary">
          Post Question
        </button>
      </form>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ask-question.js"></script>
</body>
</html>
