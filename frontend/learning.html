<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Learning Wing | EduHub</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/learning.css" />
</head>
<body>
  <header class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-badge">E</span>
        EduHub
      </a>

      <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="learning.html">Learning</a>
        <a href="favorites.html">Favorites</a>
        <a href="forum.html">Forum</a>
        <a href="bookstore.html">Bookstore</a>
        <a href="cart.html">Cart</a>
        <a href="orders.html">Orders</a>
        <a href="admin.html" class="admin-only-link" style="display: none;">Admin Panel</a>
        <button id="logoutButton" class="btn btn-secondary">Logout</button>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-header">
      <div class="container">
        <div class="page-header-card">
          <p class="eyebrow">Learning Wing</p>
          <h1>Explore academic modules</h1>
          <p>
            Browse structured modules, open lessons, access resources, and track your learning progress.
          </p>
        </div>
      </div>
    </section>

    <section class="container">
      <div id="learningMessage" class="message-box"></div>

      <div class="toolbar">
        <input
          type="search"
          id="moduleSearch"
          placeholder="Search modules by title, code, or description..."
        />

        <select id="categoryFilter">
          <option value="">All categories</option>
        </select>

        <button id="refreshModulesButton" class="btn btn-secondary">
          Refresh
        </button>
      </div>

      <div id="modulesContainer" class="learning-grid">
        <div class="empty-state">Loading modules...</div>
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/learning.js"></script>
</body>
</html>
