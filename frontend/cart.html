<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Cart | EduHub</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/learning.css" />
  <link rel="stylesheet" href="css/bookstore.css" />
</head>
<body>
  <header class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-badge">E</span>
        EduHub
      </a>

      <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="learning.html">Learning</a>
        <a href="favorites.html">Favorites</a>
        <a href="forum.html">Forum</a>
        <a href="bookstore.html">Bookstore</a>
        <a href="cart.html">Cart</a>
        <a href="orders.html">Orders</a>
        <a href="admin.html" class="admin-only-link" style="display: none;">Admin Panel</a>
        <button id="logoutButton" class="btn btn-secondary">Logout</button>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-header">
      <div class="container">
        <div class="page-header-card">
          <p class="eyebrow">Your Cart</p>
          <h1>Review your selected books</h1>
          <p>
            Update quantities, remove books, or complete a simulated checkout.
          </p>
        </div>
      </div>
    </section>

    <section class="container">
      <div id="cartMessage" class="message-box"></div>

      <div class="cart-summary">
        <div>
          <strong>Total:</strong>
          RM <span id="cartTotal">0.00</span>
        </div>

        <div class="module-actions">
          <button id="checkoutButton" class="btn btn-primary">
            Checkout
          </button>

          <button id="clearCartButton" class="btn btn-secondary">
            Clear Cart
          </button>

          <a href="bookstore.html" class="btn btn-secondary">
            Continue Shopping
          </a>
        </div>
      </div>

      <div id="cartContainer" class="cart-list">
        <div class="empty-state">Loading cart...</div>
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
